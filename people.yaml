# ============================================================================
# PEOPLE.YAML — Van Doorslaer Lab roster
# ============================================================================
# This is the ONLY file you need to edit to update the People page.
# After editing, run:   python3 build_people.py
# That regenerates people.html automatically. Then commit + push as usual.
#
# HOW TO ADD A LAB MEMBER:
#   1. Copy one of the blocks under "current_members:" below
#   2. Fill in their details
#   3. Add their photo to images/people/ (see "photo:" notes below)
#   4. Run the build script
#
# HOW TO MOVE SOMEONE TO ALUMNI:
#   1. Cut their block out of "current_members:"
#   2. Add a one-line entry under "alumni:" at the bottom
#   3. Run the build script
#
# FIELD NOTES:
#   name          - Full name as it should display
#   role          - Their title/position
#   photo         - Filename only (must already exist in images/people/),
#                   or leave blank ("") to show a placeholder instead
#   email         - Just the address, no "mailto:"
#   pubmed_url    - Full URL to their PubMed search, or blank if none
#   bio           - Multi-line is fine (use the | block syntax shown below),
#                   or leave blank ("") for no bio paragraph
#   pair_with_pi  - true only for the very first entry (Koenraad), since the
#                   layout pairs him with the next person in the same row.
#                   Leave false for everyone else - the script handles pairing
#                   automatically, two people per row, in the order listed.
# ============================================================================

current_members:

  - name: Koenraad Van Doorslaer, PhD
    role: Principal Investigator
    photo: KVD2.jpg
    email: vandoorslaer@arizona.edu
    pubmed_url: "https://www.ncbi.nlm.nih.gov/pubmed/?term=Van-Doorsaler-k+OR+doorslaer-kv+OR+van-doorslaer-k"
    resume_pdf: resume-online.pdf
    bio: |
      Dr. Van Doorslaer received his BS and MS from the University of Leuven, Belgium. He left the land of beer and chocolate to pursue a Ph.D. in the lab of Dr. Robert Burk, at the Albert Einstein College of Medicine in New York. For his post-doctoral work, he joined the lab of Dr. McBride located within the National Institute of Allergy and Infectious Disease at the NIH.
      Dr. Van Doorslaer recently joined the faculty of the School of Animal and Comparative Biomedical Sciences at the University of Arizona. His current research combines thorough evolutionary analysis with state-of-the-art molecular techniques to understand why certain DNA viruses are oncogenic. His lab is particularly interested in a subset of human oncogenic papillomaviruses.

  - name: Rob Jackson, PhD
    role: Research Associate
    photo: Rob.jpg
    email: robjackson@arizona.edu
    pubmed_url: "https://scholar.google.com/citations?user=2SDxHbMAAAAJ&hl"
    bio: |
      Rob is a recent PhD graduate from Thunder Bay, Ontario. In the lab, he seeks to understand the molecular basis for papillomavirus-related cancers using lab-grown 3D epithelial tissues, high-throughput sequencing techniques, and bioinformatics. Outside the lab, he is a sci-fi and space nerd.

  - name: Kelly King
